<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林中箱庭 · 小说转剧本工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 全局背景：丛林阳光效果 */
        body {
            background: linear-gradient(rgba(0, 40, 20, 0.7), rgba(0, 40, 20, 0.7)), 
                        url("https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&q=80&w=1920&h=1080");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e6f7e6;
        }

        /* 半透明卡片，贴合丛林色调 */
        .card {
            background: rgba(0, 30, 15, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(100, 200, 150, 0.2);
        }

        /* 按钮样式，木质感+自然绿 */
        .btn-primary {
            background: linear-gradient(to right, #2d6a4f, #40916c);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #40916c, #52b788);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(60, 100, 70, 0.6);
            border: 1px solid rgba(100, 200, 150, 0.3);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(80, 140, 100, 0.7);
        }

        /* 输入框样式，半透明+绿色边框 */
        .input-field {
            background: rgba(0, 20, 10, 0.6);
            border: 1px solid rgba(100, 200, 150, 0.3);
            color: #e6f7e6;
        }
        .input-field:focus {
            border-color: #52b788;
            outline: none;
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.3);
        }

        /* 标题样式，阳光渐变 */
        .main-title {
            background: linear-gradient(to right, #a8dadc, #f1faee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(100, 200, 150, 0.5);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 30, 15, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(100, 200, 150, 0.4); border-radius: 3px; }

        /* YAML语法高亮适配绿色主题 */
        .yaml-key { color: #a8dadc; }
        .yaml-string { color: #80ed99; }
        .yaml-number { color: #f8edeb; }
        .yaml-boolean { color: #ffddd2; }
        .yaml-comment { color: #94d2bd; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl md:text-5xl font-bold text-center mb-8 main-title">
            林中箱庭 · 小说转剧本工具
        </h1>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左侧：历史剧本 -->
            <div class="lg:col-span-3 card rounded-lg p-6 shadow-lg">
                <h2 class="text-2xl font-semibold mb-4 text-emerald-200">历史剧本</h2>
                <div id="historyList" class="space-y-3 max-h-[600px] overflow-auto">
                    <p class="text-gray-400 text-center py-4">暂无历史剧本</p>
                </div>
            </div>

            <!-- 中间：小说输入 -->
            <div class="lg:col-span-4 card rounded-lg p-6 shadow-lg">
                <h2 class="text-2xl font-semibold mb-4 text-emerald-200">小说输入</h2>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2 text-emerald-100">剧本类型</label>
                    <select id="scriptType" class="input-field w-full rounded-md px-3 py-2">
                        <option value="short_drama">短剧剧本</option>
                        <option value="comic">漫剧剧本</option>
                        <option value="stage">话剧剧本</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2 text-emerald-100">大模型</label>
                    <select id="modelSelect" class="input-field w-full rounded-md px-3 py-2">
                        <option value="doubao">豆包AI（火山方舟）</option>
                        <option value="deepseek" disabled>DeepSeek（开发中）</option>
                        <option value="qwen" disabled>通义千问（开发中）</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2 text-emerald-100">API密钥</label>
                    <div class="flex gap-2">
                        <input type="password" id="apiKey" class="input-field flex-1 rounded-md px-3 py-2" placeholder="请输入你的API密钥">
                        <button id="toggleApiKey" class="btn-secondary px-3 rounded-md">👁️</button>
                    </div>
                    <div class="flex items-center mt-2">
                        <input type="checkbox" id="rememberApiKey" class="mr-2 accent-emerald-500">
                        <label class="text-xs text-gray-300">记住我的密钥（仅保存在本地）</label>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-emerald-100">小说内容</label>
                        <span id="wordCount" class="text-xs text-gray-400">0 字</span>
                    </div>
                    <textarea id="novelContent" rows="10" class="input-field w-full rounded-md px-3 py-2 resize-none" placeholder="在这里粘贴你的小说内容..."></textarea>
                </div>

                <button id="generateBtn" class="btn-primary w-full text-white font-medium py-3 rounded-md">生成剧本</button>
            </div>

            <!-- 右侧：剧本输出 -->
            <div class="lg:col-span-5 card rounded-lg p-6 shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold text-emerald-200">剧本输出</h2>
                    <span id="scriptStatus" class="text-xs text-gray-400">等待生成</span>
                </div>

                <div class="mb-4 flex flex-wrap gap-2">
                    <button id="editBtn" disabled class="btn-secondary flex-1 py-2 rounded-md">编辑模式</button>
                    <button id="saveBtn" disabled class="btn-secondary flex-1 py-2 rounded-md">保存剧本</button>
                    <button id="downloadBtn" disabled class="btn-secondary flex-1 py-2 rounded-md">下载YAML</button>
                </div>

                <div id="outputArea" class="bg-black/30 rounded-md p-4 h-[500px] overflow-auto font-mono text-sm">
                    <p class="text-gray-400 text-center py-20">生成的剧本将显示在这里</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM元素
        const generateBtn = document.getElementById('generateBtn');
        const novelContent = document.getElementById('novelContent');
        const scriptType = document.getElementById('scriptType');
        const modelSelect = document.getElementById('modelSelect');
        const apiKeyInput = document.getElementById('apiKey');
        const toggleApiKeyBtn = document.getElementById('toggleApiKey');
        const rememberApiKeyCheckbox = document.getElementById('rememberApiKey');
        const outputArea = document.getElementById('outputArea');
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const historyList = document.getElementById('historyList');
        const wordCount = document.getElementById('wordCount');
        const scriptStatus = document.getElementById('scriptStatus');

        // 全局状态
        let currentYaml = '';
        let currentNovelContent = '';
        let isEditMode = false;
        let currentScriptId = null;
        let isGenerating = false;

        // 页面初始化
        window.addEventListener('load', init);

        function init() {
            loadLocalStorage();
            loadHistory();
            bindEvents();
        }

        // 绑定事件
        function bindEvents() {
            generateBtn.addEventListener('click', generateScript);
            novelContent.addEventListener('input', updateWordCount);
            toggleApiKeyBtn.addEventListener('click', toggleApiKeyVisibility);
            rememberApiKeyCheckbox.addEventListener('change', saveApiKeyToLocalStorage);
            editBtn.addEventListener('click', toggleEditMode);
            saveBtn.addEventListener('click', saveScript);
            downloadBtn.addEventListener('click', downloadScript);
            novelContent.addEventListener('input', debounce(saveInputToLocalStorage, 500));
            scriptType.addEventListener('change', saveInputToLocalStorage);
            modelSelect.addEventListener('change', saveInputToLocalStorage);
        }

        // 加载本地存储
        function loadLocalStorage() {
            const savedApiKey = localStorage.getItem('doubao_api_key');
            if (savedApiKey) {
                apiKeyInput.value = savedApiKey;
                rememberApiKeyCheckbox.checked = true;
            }
            const savedNovelContent = localStorage.getItem('novel_content');
            if (savedNovelContent) {
                novelContent.value = savedNovelContent;
                updateWordCount();
            }
            const savedScriptType = localStorage.getItem('script_type');
            if (savedScriptType) {
                scriptType.value = savedScriptType;
            }
        }

        // 保存API密钥到本地
        function saveApiKeyToLocalStorage() {
            if (rememberApiKeyCheckbox.checked) {
                localStorage.setItem('doubao_api_key', apiKeyInput.value);
            } else {
                localStorage.removeItem('doubao_api_key');
            }
        }

        // 保存输入内容到本地
        function saveInputToLocalStorage() {
            localStorage.setItem('novel_content', novelContent.value);
            localStorage.setItem('script_type', scriptType.value);
            localStorage.setItem('selected_model', modelSelect.value);
        }

        // 切换API密钥可见性
        function toggleApiKeyVisibility() {
            const type = apiKeyInput.type === 'password' ? 'text' : 'password';
            apiKeyInput.type = type;
            toggleApiKeyBtn.textContent = type === 'password' ? '👁️' : '🙈';
        }

        // 更新字数统计
        function updateWordCount() {
            wordCount.textContent = novelContent.value.length + ' 字';
        }

        // 加载历史剧本列表
        async function loadHistory() {
            try {
                const response = await fetch('/api/scripts');
                if (!response.ok) throw new Error('服务器响应错误');
                
                const scripts = await response.json();
                
                if (scripts.length === 0) {
                    historyList.innerHTML = '<p class="text-gray-400 text-center py-4">暂无历史剧本</p>';
                    return;
                }
                
                historyList.innerHTML = '';
                scripts.forEach(script => {
                    const scriptItem = document.createElement('div');
                    scriptItem.className = 'bg-emerald-900/50 rounded-md p-3 cursor-pointer hover:bg-emerald-800/50 transition-colors duration-200';
                    
                    const createdAt = new Date(script.created_at).toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    scriptItem.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex-1 mr-2">
                                <div class="font-medium truncate text-emerald-100">${escapeHtml(script.title)}</div>
                                <div class="text-xs text-gray-400 mt-1">${script.script_type} · ${createdAt}</div>
                            </div>
                        </div>
                    `;

                    scriptItem.addEventListener('click', () => loadScript(script.id));
                    historyList.appendChild(scriptItem);
                });
            } catch (error) {
                console.error('加载历史剧本失败:', error);
                historyList.innerHTML = '<p class="text-red-400 text-center py-4">加载历史失败，请刷新重试</p>';
            }
        }

        // 加载单个剧本
        async function loadScript(scriptId) {
            try {
                const response = await fetch(`/api/scripts/${scriptId}`);
                if (!response.ok) throw new Error('加载剧本失败');
                
                const script = await response.json();
                
                currentScriptId = script.id;
                currentYaml = script.yaml_content;
                currentNovelContent = script.novel_content;
                
                novelContent.value = script.novel_content;
                scriptType.value = script.script_type;
                updateWordCount();
                
                renderYamlOutput(currentYaml);
                isEditMode = false;
                editBtn.textContent = '编辑模式';
                scriptStatus.textContent = '已加载历史剧本';
                
                setButtonsEnabled(true);
            } catch (error) {
                alert('加载剧本失败：' + error.message);
            }
        }

        // 生成剧本
        async function generateScript() {
            const content = novelContent.value.trim();
            const apiKey = apiKeyInput.value.trim();
            
            if (!content) {
                alert('请输入小说内容');
                return;
            }
            
            if (!apiKey) {
                alert('请输入API密钥');
                return;
            }

            if (isGenerating) return;
            
            currentNovelContent = content;
            currentScriptId = null;
            isGenerating = true;
            
            generateBtn.disabled = true;
            generateBtn.innerHTML = '⏳ 生成中...';
            outputArea.innerHTML = '<p class="text-emerald-300 text-center py-20">正在生成剧本，请稍候...</p>';
            scriptStatus.textContent = '正在生成...';
            setButtonsEnabled(false);

            try {
                const response = await fetch('/api/generate-script', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: content,
                        script_type: scriptType.value,
                        model: modelSelect.value,
                        api_key: apiKey
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    currentYaml = data.yaml;
                    renderYamlOutput(currentYaml);
                    isEditMode = false;
                    editBtn.textContent = '编辑模式';
                    scriptStatus.textContent = '生成成功';
                    setButtonsEnabled(true);
                } else {
                    const errorMsg = data.detail || '生成失败，请检查API密钥是否正确';
                    outputArea.innerHTML = `<p class="text-red-400 text-center py-20">${escapeHtml(errorMsg)}</p>`;
                    scriptStatus.textContent = '生成失败';
                }
            } catch (error) {
                outputArea.innerHTML = `<p class="text-red-400 text-center py-20">网络错误：${escapeHtml(error.message)}</p>`;
                scriptStatus.textContent = '网络错误';
            } finally {
                isGenerating = false;
                generateBtn.disabled = false;
                generateBtn.innerHTML = '生成剧本';
            }
        }

        // 渲染带语法高亮的YAML
        function renderYamlOutput(yaml) {
            const highlighted = yaml
                .replace(/(#.*)$/gm, '<span class="yaml-comment">$1</span>')
                .replace(/^(\s*[\w-]+:)/gm, '<span class="yaml-key">$1</span>')
                .replace(/:\s*(".*?"|'.*?')/g, ': <span class="yaml-string">$1</span>')
                .replace(/:\s*(\d+\.?\d*)/g, ': <span class="yaml-number">$1</span>')
                .replace(/:\s*(true|false)/g, ': <span class="yaml-boolean">$1</span>');
            
            outputArea.innerHTML = `<pre class="whitespace-pre-wrap">${highlighted}</pre>`;
        }

        // 切换编辑模式
        function toggleEditMode() {
            if (!currentYaml) return;
            
            isEditMode = !isEditMode;
            
            if (isEditMode) {
                outputArea.innerHTML = `<textarea id="editArea" class="w-full h-full bg-black/50 text-emerald-100 p-2 border border-emerald-500/30 rounded">${escapeHtml(currentYaml)}</textarea>`;
                editBtn.textContent = '保存编辑';
                scriptStatus.textContent = '编辑模式';
            } else {
                currentYaml = outputArea.querySelector('textarea').value;
                renderYamlOutput(currentYaml);
                editBtn.textContent = '编辑模式';
                scriptStatus.textContent = '编辑已保存';
            }
        }

        // 保存剧本
        async function saveScript() {
            if (!currentYaml) {
                alert('没有可保存的剧本');
                return;
            }
            
            const defaultTitle = `剧本_${new Date().toLocaleString('zh-CN')}`;
            const title = prompt('请输入剧本标题：', defaultTitle);
            if (!title) return;
            
            try {
                let response;
                
                if (currentScriptId) {
                    response = await fetch(`/api/scripts/${currentScriptId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            title: title,
                            script_type: scriptType.value,
                            novel_content: currentNovelContent,
                            yaml_content: currentYaml
                        })
                    });
                } else {
                    response = await fetch('/api/scripts', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            title: title,
                            script_type: scriptType.value,
                            novel_content: currentNovelContent,
                            yaml_content: currentYaml
                        })
                    });
                }
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    alert('剧本保存成功！');
                    currentScriptId = data.id;
                    loadHistory();
                    scriptStatus.textContent = '已保存';
                } else {
                    alert('保存失败：' + (data.detail || '未知错误'));
                }
            } catch (error) {
                alert('网络错误：' + error.message);
            }
        }

        // 下载YAML
        function downloadScript() {
            if (!currentYaml) {
                alert('没有可下载的剧本');
                return;
            }
            
            const defaultFilename = `剧本_${new Date().getTime()}.yaml`;
            const filename = prompt('请输入文件名：', defaultFilename);
            if (!filename) return;
            
            const blob = new Blob([currentYaml], { type: 'text/yaml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename.endsWith('.yaml') ? filename : `${filename}.yaml`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 设置按钮启用状态
        function setButtonsEnabled(enabled) {
            editBtn.disabled = !enabled;
            saveBtn.disabled = !enabled;
            downloadBtn.disabled = !enabled;
        }

        // HTML转义（防止XSS）
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
    </script>
</body>
</html>
